<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pageL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- rounded dark background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- open book -->
  <path d="M32 26 C27 22.5 19.5 21.5 13 22.5 L13 47 C19.5 46 27 47 32 50.5 Z" fill="url(#pageL)"/>
  <path d="M32 26 C37 22.5 44.5 21.5 51 22.5 L51 47 C44.5 46 37 47 32 50.5 Z" fill="url(#pageR)"/>
  <!-- book spine highlight -->
  <path d="M32 26 L32 50.5" stroke="#0f172a" stroke-width="1.6"/>

  <!-- text lines on pages -->
  <g stroke="#0f172a" stroke-width="1.6" stroke-linecap="round" opacity="0.45">
    <path d="M18 29.5 C21.5 29 25 29.5 27.5 30.8"/>
    <path d="M18 34.5 C21.5 34 25 34.5 27.5 35.8"/>
    <path d="M18 39.5 C21.5 39 25 39.5 27.5 40.8"/>
    <path d="M36.5 30.8 C39 29.5 42.5 29 46 29.5"/>
    <path d="M36.5 35.8 C39 34.5 42.5 34 46 34.5"/>
    <path d="M36.5 40.8 C39 39.5 42.5 39 46 39.5"/>
  </g>

  <!-- speech bubble with thinking spark -->
  <path d="M24 7 h16 a5 5 0 0 1 5 5 v5 a5 5 0 0 1 -5 5 h-7 l-5 4.5 v-4.5 h-4 a5 5 0 0 1 -5 -5 v-5 a5 5 0 0 1 5 -5 Z" fill="#f8fafc"/>
  <!-- spark ✦ inside bubble -->
  <path d="M32 9.2 l1.5 3.8 3.8 1.5 -3.8 1.5 -1.5 3.8 -1.5 -3.8 -3.8 -1.5 3.8 -1.5 Z" fill="#8b5cf6"/>
</svg>
