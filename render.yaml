services:
  - type: web
    name: symporead
    runtime: node
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: PORT
        value: 3000
